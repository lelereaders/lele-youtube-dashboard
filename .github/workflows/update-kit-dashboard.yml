name: Update Kit Dashboard

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    env:
      KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
      KIT_MAX_SUBSCRIBERS: "500"
      KIT_MAX_ASSETS: "100"
      KIT_MAX_BROADCASTS: "25"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update Kit dashboard data
        shell: pwsh
        run: ./scripts/kit_analysis.ps1

      - name: Commit updated dashboard
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/kit-dashboard-data.js
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Update Kit dashboard data"
            git push
          fi
