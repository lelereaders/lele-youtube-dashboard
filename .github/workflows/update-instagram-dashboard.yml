name: Update Instagram Dashboard

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    env:
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_GRAPH_VERSION: "v25.0"
      INSTAGRAM_MAX_MEDIA: "50"
      INSTAGRAM_MAX_COMMENTS_PER_MEDIA: "25"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update Instagram dashboard data
        shell: pwsh
        run: ./scripts/instagram_analysis.ps1

      - name: Commit updated dashboard
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/instagram-dashboard-data.js
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Update Instagram dashboard data"
            git push
          fi
