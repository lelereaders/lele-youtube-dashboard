name: Update YouTube Dashboard

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
      YOUTUBE_MAX_VIDEOS: "100"
      YOUTUBE_MAX_COMMENTS_PER_VIDEO: "100"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update dashboard data
        shell: pwsh
        run: ./scripts/update-dashboard.ps1

      - name: Commit updated dashboard
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/youtube-dashboard-data.js youtube_reports/YouTube_Comment_Insights_latest.xlsx
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Update YouTube dashboard data"
            git push
          fi
